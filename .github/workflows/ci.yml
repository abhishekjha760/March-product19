name: CI Pipeline

# Trigger on every PR targeting main, and on direct pushes to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  build-and-analyse:
    name: Build, Test & Analyse
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is required by SonarCloud for blame / new-code detection
          fetch-depth: 0

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build + test + coverage (single Maven invocation) ─────────────
      #    'verify' compiles, runs tests, generates JaCoCo report, AND
      #    the spring-boot:repackage goal produces the fat JAR – all in one go.
      - name: Build, test & generate coverage
        run: mvn --batch-mode verify

      # ── 4. Publish JUnit test results as a PR check ──────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      # ── 5. Upload JaCoCo HTML coverage report ────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      # ── 6. Upload the fat JAR ─────────────────────────────────────────────
      #    'verify' already built and repackaged the JAR.
      #    We exclude the .jar.original (thin JAR) – only upload the fat JAR.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: url-shortener-${{ github.run_number }}
          path: |
            target/*.jar
            !target/*.jar.original
          retention-days: 14

      # ── 7. SonarCloud static analysis ────────────────────────────────────
      #    Skipped automatically when SONAR_TOKEN secret is not configured.
      - name: SonarCloud scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # set in repo → Settings → Secrets

      # ── 8. SonarCloud Quality Gate ───────────────────────────────────────
      #    Fails the pipeline if the Quality Gate is not green.
      - name: Check SonarCloud Quality Gate
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
