name: CI Pipeline

# Trigger on every push and PR targeting main
on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  build-and-analyse:
    name: Build, Test & Analyse
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is required by SonarCloud for blame / new-code detection
          fetch-depth: 0

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build the fat JAR (skip tests so the JAR is always produced) ───
      #    spring-boot:repackage is bound to the package phase.
      #    Running with -DskipTests guarantees the JAR exists even when
      #    tests fail later, so the artifact upload step always has something.
      - name: Build JAR
        run: mvn --batch-mode package -DskipTests

      # ── 4. Upload the fat JAR immediately after build ────────────────────
      #    Uploaded here so it is available even if subsequent steps fail.
      #    We exclude the .jar.original (thin JAR) – only upload the fat JAR.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: url-shortener-${{ github.run_number }}
          path: |
            target/*.jar
            !target/*.jar.original
          retention-days: 14

      # ── 5. Run tests & generate JaCoCo coverage report ───────────────────
      #    'continue-on-error' keeps subsequent steps (reports, Sonar) running
      #    even when a test fails so all results are uploaded.
      - name: Run tests & generate coverage
        run: mvn --batch-mode test jacoco:report
        continue-on-error: true

      # ── 6. Publish JUnit test results as a PR check ──────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      # ── 7. Upload JaCoCo HTML coverage report ────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      # ── 8. SonarCloud static analysis ────────────────────────────────────
      #    Skipped automatically when SONAR_TOKEN secret is not configured.
      - name: SonarCloud scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # set in repo → Settings → Secrets

      # ── 9. SonarCloud Quality Gate ───────────────────────────────────────
      #    Fails the pipeline if the Quality Gate is not green.
      - name: Check SonarCloud Quality Gate
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
