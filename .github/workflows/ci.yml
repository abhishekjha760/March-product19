name: CI Pipeline

# Trigger on every push to main and on every PR targeting main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-analyse:
    name: Build, Test & Analyse
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history is required by SonarCloud to compute blame info
          fetch-depth: 0

      # ── 2. Set up Java 17 ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs

      # ── 3. Compile ───────────────────────────────────────────────────────
      - name: Compile
        run: mvn --batch-mode compile

      # ── 4. Run unit tests & generate JaCoCo coverage report ─────────────
      - name: Run tests & generate coverage
        run: mvn --batch-mode verify

      # ── 5. Publish test results ──────────────────────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()            # run even when tests fail
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      # ── 6. SonarCloud analysis ───────────────────────────────────────────
      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.organization=${{ vars.SONAR_ORG }} \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # ── 7. Upload JaCoCo HTML report as an artifact ──────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      # ── 8. Build the Spring Boot fat JAR ─────────────────────────────────
      - name: Package artifact
        run: mvn --batch-mode package -DskipTests

      # ── 9. Upload the JAR as a GitHub Actions artifact ───────────────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: url-shortener-jar
          path: target/*.jar
          retention-days: 14

      # ── 10. (Optional) Check SonarCloud Quality Gate status ─────────────
      - name: Check Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

